<!doctype html>
<meta charset="utf-8" />
<title>Make z0 land-only SVG tile (256×256)</title>
<body>
<button id="btn">Generate & download tile-z0-land.svg</button>

<script type="module">
import * as d3 from "https://cdn.jsdelivr.net/npm/d3@7/+esm";
import { feature } from "https://cdn.jsdelivr.net/npm/topojson-client@3/+esm";

// Land polygons derived from Natural Earth (small, good for a thumbnail).
// Files listed here: https://cdn.jsdelivr.net/npm/world-atlas@2/ :contentReference[oaicite:1]{index=1}
const LAND_TOPOJSON = "https://cdn.jsdelivr.net/npm/world-atlas@2/land-110m.json";

const W = 256, H = 256;

function z0WebMercator() {
  // For Web Mercator tiles, the whole world at z=0 spans 256px.
  // D3's geoMercator scale is px per radian.
  return d3.geoMercator()
    .scale(W / (2 * Math.PI))
    .translate([W / 2, H / 2])
    .clipExtent([[0, 0], [W, H]]);
}

async function buildSvg() {
  const topo = await (await fetch(LAND_TOPOJSON)).json();
  const land = feature(topo, topo.objects.land);

  const path = d3.geoPath(z0WebMercator());

  // Land only; style via CSS variable --land
  return `
<svg xmlns="http://www.w3.org/2000/svg" width="${W}" height="${H}" viewBox="0 0 ${W} ${H}">
  <style>
    :root { --land: #111; }
    .land { fill: var(--land); }
  </style>
  <path class="land" d="${path(land)}"/>
</svg>`.trim();
}

function download(filename, text) {
  const blob = new Blob([text], { type: "image/svg+xml;charset=utf-8" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
}

document.getElementById("btn").addEventListener("click", async () => {
  const svg = await buildSvg();
  download("tile-z0-land.svg", svg);
});
</script>
</body>
